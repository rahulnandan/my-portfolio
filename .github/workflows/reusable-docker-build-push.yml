name: Reusable - Docker Build & Push

# The Docker Hub username is an input, not a secret, on purpose: the image
# reference is emitted as a workflow output, and GitHub scrubs any output whose
# value contains a secret. Building the reference from `secrets.*` therefore
# yielded an empty `image` output downstream and broke the ECS deploy. The
# username is not sensitive (it is half of a public image name); only the token
# is.
on:
  workflow_call:
    inputs:
      dockerhub-username:
        description: Docker Hub account that owns the image repository.
        type: string
        required: true
      image-name:
        description: Docker Hub repository name (appended to the Docker Hub username).
        type: string
        default: myportfolio
      push-latest:
        description: Also tag and push ":latest" (main builds only).
        type: boolean
        default: false
    secrets:
      dockerhub-token:
        required: true
    outputs:
      image:
        description: Full image reference that was pushed.
        value: ${{ jobs.build-push.outputs.image }}

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.primary }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          repo="${{ inputs.dockerhub-username }}/${{ inputs.image-name }}"
          # Branch names can contain "/" (e.g. feature/x), which isn't a
          # valid Docker tag component - flatten it.
          safe_ref="$(echo "${{ github.ref_name }}" | tr '/' '-')"
          primary="${repo}:${safe_ref}-${{ github.sha }}"
          tags="${primary}"
          if [ "${{ inputs.push-latest }}" = "true" ]; then
            tags="${tags},${repo}:latest"
          fi
          echo "primary=${primary}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
