name: Reusable - Static Analysis

# Runs SpotBugs + PMD via `mvn site`, which also generates a navigable
# target/site/index.html linking both reports (see the <reporting> section
# in pom.xml). Report-only by default - see pom.xml for how to turn this
# into a hard quality gate.

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "21"

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven

      - name: Generate SpotBugs + PMD site
        run: mvn -B site

      - name: Upload analysis site artifact
        uses: actions/upload-artifact@v4
        with:
          name: analysis-site
          path: target/site
          retention-days: 30
